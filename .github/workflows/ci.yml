name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake pkg-config \
          librabbitmq-dev libjansson-dev libcunit1-dev

    - name: Build (Debug)
      run: make debug

    - name: Run tests
      run: make test

    - name: Build (Release)
      run: make release

    - name: Code style check
      run: make lint || true

    - name: Memory safety check
      run: make debug && ASAN_OPTIONS=verbosity=1 ./build/bin/smoothoperator --help || true

  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake pkg-config \
          librabbitmq-dev libjansson-dev libcunit1-dev gcov

    - name: Generate coverage
      run: make coverage || true

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.info
        fail_ci_if_error: false
